name: Android APK Build

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: [self-hosted, macOS]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --parallel --build-cache

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/cheddr-tictactoe-${VERSION}-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/cheddr-tictactoe-*-debug.apk
          generate_release_notes: true
